services:
  dockyard:
    image: kareemwaheed/dockyard:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./secret-keys:/app/secret-keys:ro
      # Mount your custom build scripts (optional, for the Build feature):
      # - ./scripts:/scripts:ro
      - data:/data
      - repos:/repos
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  repos:
  data:
